; Media uploads (video) — keep in sync with nginx client_max_body_size
upload_max_filesize = 512M
post_max_size = 512M
memory_limit = 512M
max_execution_time = 120
max_input_time = 120

; OPcache (production)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0

expose_php = Off

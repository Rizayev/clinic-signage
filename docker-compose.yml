# Coolify deployment — ONE image, 4 services:
#   web    : nginx + php-fpm  (SPA, API, /storage)   -> domain on port 80
#   reverb : Laravel Reverb WebSocket server         -> domain on port 8080
#   queue  : database queue worker                   -> no domain
#   mysql  : database (persistent volume)
#
# Env values are interpolated by Coolify from the app's Environment Variables.

x-app-env: &app-env
  APP_NAME: ${APP_NAME:-Clinic Signage}
  APP_ENV: production
  APP_KEY: ${APP_KEY}
  APP_DEBUG: "false"
  APP_URL: ${APP_URL}
  APP_LOCALE: ${APP_LOCALE:-ru}
  APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Baku}
  LOG_CHANNEL: stack
  LOG_STACK: single
  LOG_LEVEL: ${LOG_LEVEL:-warning}

  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: ${DB_DATABASE:-signage}
  DB_USERNAME: ${DB_USERNAME:-signage}
  DB_PASSWORD: ${DB_PASSWORD}

  SESSION_DRIVER: database
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  FILESYSTEM_DISK: public
  BROADCAST_CONNECTION: reverb

  # Server-side publish to Reverb (internal compose network)
  REVERB_APP_ID: ${REVERB_APP_ID}
  REVERB_APP_KEY: ${REVERB_APP_KEY}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET}
  REVERB_HOST: reverb
  REVERB_PORT: "8080"
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: "8080"

  MAIL_MAILER: ${MAIL_MAILER:-log}

x-build: &build
  context: .
  dockerfile: Dockerfile
  args:
    # BAKED into JS at build time — PUBLIC reverb endpoint
    VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
    VITE_REVERB_HOST: ${VITE_REVERB_HOST}
    VITE_REVERB_PORT: ${VITE_REVERB_PORT:-80}
    VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}

services:
  web:
    build: *build
    image: clinic-signage:latest
    environment:
      <<: *app-env
      CONTAINER_ROLE: web
    expose:
      - "80"
    volumes:
      - storage-app:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  reverb:
    build: *build
    image: clinic-signage:latest
    environment:
      <<: *app-env
      CONTAINER_ROLE: reverb
    expose:
      - "8080"
    restart: unless-stopped

  queue:
    build: *build
    image: clinic-signage:latest
    environment:
      <<: *app-env
      CONTAINER_ROLE: queue
    volumes:
      - storage-app:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-signage}
      MYSQL_USER: ${DB_USERNAME:-signage}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  storage-app:
  db-data:
